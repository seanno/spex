<!DOCTYPE html>
<html>
  <head>
    <title>SPEX — Launching…</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.min.js"></script>
  </head>
  <body>
    <script>
      const params = new URLSearchParams(document.location.search);
      const client = params.get('client');

      // Compute redirect URI as the directory root (e.g. https://host:port/)
      const ichQuestion = window.location.href.indexOf('?');
      const url = ichQuestion === -1
        ? window.location.href
        : window.location.href.substring(0, ichQuestion);
      const redirectUri = url.substring(0, url.lastIndexOf('/') + 1);

      const type = params.get('type');
      const scopeParam = params.get('scope');
      const CERNER_SCOPES = 'patient/Appointment.read patient/Binary.read patient/CarePlan.read patient/CareTeam.read patient/Condition.read patient/Consent.read patient/Coverage.read patient/Device.read patient/DiagnosticReport.read patient/DocumentReference.read patient/Encounter.read patient/FamilyMemberHistory.read patient/Goal.read patient/Immunization.read patient/InsurancePlan.read patient/Media.read patient/MedicationAdministration.read patient/MedicationDispense.read patient/MedicationRequest.read patient/NutritionOrder.read patient/Observation.read patient/Patient.read patient/Person.read patient/Procedure.read patient/Provenance.read patient/Questionnaire.read patient/QuestionnaireResponse.read patient/RelatedPerson.read patient/Schedule.read patient/ServiceRequest.read patient/Slot.read patient/Specimen.read';
      const scope = 'openid launch/patient profile ' +
        (type === 'cerner' ? CERNER_SCOPES : (scopeParam ?? 'patient/*.read patient/*.search'));

      // iss is read automatically by fhirclient from the URL query string
      FHIR.oauth2.authorize({
        clientId: client,
        redirectUri: redirectUri,
        scope: scope,
        pkceMode: 'unsafeV1',
      });
    </script>
  </body>
</html>
